<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certified Barista Training | Stephen O'Byrne</title>

<link rel="icon" href="Favicon_V1.svg">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0A0A0A;
    color: #F2F0EB;
    text-align: center;
}

nav {
    padding: 20px;
    border-bottom: 1px solid #333;
}

nav a {
    margin: 0 15px;
    cursor: pointer;
    text-decoration: none;
    color: #F2F0EB;
}

.hero {
    padding: 100px 20px;
}

.hero h1 {
    font-size: 48px;
}

.accent {
    color: #8AAE97;
}

.cta {
    margin-top: 30px;
    padding: 15px 30px;
    background: #8AAE97;
    border: none;
    cursor: pointer;
}

img {
    max-width: 300px;
    margin-top: 40px;
}
</style>
</head>

<body>

<nav>
    <a onclick="show('home')">Home</a>
    <a onclick="show('about')">About</a>
    <a onclick="show('services')">Services</a>
</nav>

<div id="home" class="section">
    <div class="hero">
        <h1>
            Great equipment does not<br>
            <span class="accent">guarantee great coffee.</span>
        </h1>
        <p>Certified barista training across Ireland.</p>
        <button class="cta">Book a Session</button>

        <img src="Stephens headshot.jpeg" alt="Stephen">
    </div>
</div>

<div id="about" class="section" style="display:none;">
    <h2>About Stephen</h2>
    <p>Certified Barista Trainer with 20 years experience.</p>
</div>

<div id="services" class="section" style="display:none;">
    <h2>Services</h2>
    <p>Training packages available for individuals and teams.</p>
</div>

<script>
function show(id) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}
</script>

</body>
</html>

<!-- END COPY -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certified Barista Training | Stephen O'Byrne</title>

<link rel="icon" href="Favicon_V1.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background:#0A0A0A;
    color:#F2F0EB;
    font-family:'Sora',sans-serif;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    border-bottom:1px solid #222;
}

nav img{height:60px;cursor:pointer;}

.nav-links a{
    margin-left:20px;
    cursor:pointer;
    text-transform:uppercase;
    font-size:12px;
}

/* HERO */
.hero{
    text-align:center;
    padding:100px 20px;
}

.hero h1{
    font-size:48px;
}

.accent{color:#8AAE97;}

.cta-button{
    margin-top:30px;
    padding:15px 30px;
    background:#8AAE97;
    border:none;
    cursor:pointer;
}

/* SECTIONS */
.content-section{display:none;}
.content-section.active{display:block;}

/* SIMPLE CARDS */
.section{
    padding:60px 20px;
    text-align:center;
}

img{
    max-width:300px;
    margin-top:20px;
}
</style>
</head>

<body>

<nav>
<img src="Logo_ClassicEmblem_Transparent.png" onclick="showSection('home')">
<div class="nav-links">
<a onclick="showSection('home')">Home</a>
<a onclick="showSection('about')">About</a>
<a onclick="showSection('services')">Services</a>
</div>
</nav>

<!-- HOME -->
<div id="home" class="content-section active">
<section class="hero">
<h1>
Great equipment does not<br>
<span class="accent">guarantee great coffee.</span>
</h1>

<p>Certified barista training across Ireland</p>

<button class="cta-button" onclick="showSection('services')">
Book a Session
</button>

<br>
<img src="Stephens headshot.jpeg">
</section>
</div>

<!-- ABOUT -->
<div id="about" class="content-section">
<section class="section">
<h2>About Stephen</h2>
<p>Certified Barista Trainer with 20+ years experience working with cafés across Ireland.</p>
</section>
</div>

<!-- SERVICES -->
<div id="services" class="content-section">
<section class="section">
<h2>Services</h2>
<p>On-site barista training tailored to your business.</p>
</section>
</div>

<script>
function showSection(sectionId){
    const sections=document.querySelectorAll('.content-section');
    sections.forEach(s=>s.classList.remove('active'));

    document.getElementById(sectionId).classList.add('active');

    window.scrollTo({top:0,behavior:'smooth'});
}
</script>

</body>
</html>
